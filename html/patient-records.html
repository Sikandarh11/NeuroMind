<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Records - NeuroMind</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/patient-records.css">
    <link rel="stylesheet" href="/css/pi-connect.css">
</head>

<body>

    <canvas id="neuro-bg"></canvas>

    <button class="fab-chat" id="fabChat" onclick="toggleChat(true)">
        <i class="fas fa-comment-medical"></i>
    </button>

    <aside class="chat-panel" id="chatPanel">
        <div class="chat-header">
            <h3><i class="fas fa-robot"></i> Assistant</h3>
            <button class="chat-close-btn" onclick="toggleChat(false)"><i class="fas fa-times"></i></button>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="msg msg-bot">
                Hello! This is the full registry of patient records.
            </div>
        </div>
        <div class="chat-footer">
            <input type="text" class="chat-input" id="chatInput" placeholder="Ask details..." onkeypress="handleKeyPress(event)">
            <button class="btn-send" onclick="sendChatMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </aside>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
            <div class="brand-text">NEUROMIND</div>
        </div>
        <ul class="nav-list">
            <li><a href="/dashboard" class="nav-link"><i class="fas fa-th-large"></i><span class="link-text">ML Models</span></a></li>
            <li><a href="/patient-records" class="nav-link active-link"><i class="fas fa-users"></i><span class="link-text">Patient Records</span></a></li>
            <li><a href="/chatbot" class="nav-link"><i class="fas fa-comments"></i><span class="link-text">AI Chatbot</span></a></li>
            <li><a href="/classification" class="nav-link"><i class="fas fa-chart-line"></i><span class="link-text">Classification</span></a></li>
            <li style="margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1);"><a href="/login" class="nav-link"><i class="fas fa-sign-out-alt"></i><span class="link-text">Logout</span></a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="doctor-info">
            <div class="doctor-header">
                <div class="doctor-details">
                    <h1 id="doctorName">Dr. Welcome</h1>
                    <div class="doctor-meta">
                        <span><i class="fas fa-id-card"></i> ID: <span id="doctorId">-</span></span>
                        <span><i class="fas fa-hospital"></i> Hospital: <span id="doctorHospital">-</span></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="patient-section">
            <div class="section-header">
                <div>
                    <h2>Patient Records</h2>
                    <p class="patient-count" id="patientCountLabel">Total Patients: 5</p>
                </div>
                <a href="/add-patient" class="btn-add"><i class="fas fa-plus"></i> Add Patient</a>
            </div>

            <div class="search-bar">
                <input type="text" class="search-input" placeholder="Search by patient name or ID..." id="searchInput">
                <button class="btn-search"><i class="fas fa-search"></i></button>
            </div>

            <table class="patient-table">
                <thead>
                    <tr>
                        <th>Patient ID</th>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Last Visit</th>
                        <th class="text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="patientTableBody">
                    </tbody>
            </table>
        </div>
    </main>

    <script src="/js/patient-records.js"></script>
    <script src="/js/pi-connect.js"></script>
</body>
</html>
